name: "Build Jinja2-live-parser Docker Images"

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6
      with:
        repository: ${{ github.repository }}
        token: ${{ github.token }}
        ref: ${{ github.ref_name }}
    
    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ vars.DOCKER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build BackEnd Image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: | 
          ${{ vars.DOCKER_REGISTRY }}/${{ github.repository }}/backend:${{ github.ref_name}}
          ${{ vars.DOCKER_REGISTRY }}/${{ github.repository }}/backend:latest
        platforms: linux/amd64,linux/arm64

    - name: Build Frontend Image
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: |
          ${{ vars.DOCKER_REGISTRY }}/${{ github.repository }}/frontend:${{ github.ref_name}}
          ${{ vars.DOCKER_REGISTRY }}/${{ github.repository }}/frontend:latest
        platforms: linux/amd64,linux/arm64
 
